<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700&display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Urbanist:wght@700&display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap');
    </style>
    <style>
      @media only screen and (max-width: 600px) {
        .outer {
          margin: auto !important;
          width: 100% !important;
        }

        .inner {
          margin: auto;
          border: 1px solid #e1e1e1;
          border-radius: 12px;
          background-color: #2050e9;
        }
      }
    </style>
  </head>
  <body>
    <div class="outer" style="margin: auto; width: 80%; max-width: 640px; padding: 32px">
      <div class="inner" style="
              margin: auto;
              max-width: 576px;
              border: 1px solid #e1e1e1;
              border-radius: 12px;
              padding: 24px;
              background-color: #ffffff;
            ">
        <div>
          <br />
          <center>
            <img src="https://d92mrp7hetgfk.cloudfront.net/images/sites/misc/dibimbing/original.png?1689354623" alt=" Logo" width="30%" />
          </center>
          <br>
          <hr>
        </div>
        <br />
        <div style="
                background-color: #ffffff;
                border-radius: 16px;
                padding: 0px 32px;
              ">
          <p style="
                  font-family: Arial;
                  font-style: normal;
                  font-size: 14px;
                "> Hallo Team, <br>
            <br> Test email <br /> Data Team
          </p>
          <br />
          <br />
        </div>
      </div>
      <footer style="
            text-align: center;
            font-family: 'Urbanist', sans-serif;
            font-weight: 400;
            font-size: 12px;
            color: #3d3d3d;
            margin-top: 24px;
            background-color: #f2f2f2;
            padding: 8px 0;
            border-radius: 0 0 12px 12px;
            "> © {{ current_year }}. PT xxx. All Rights Reserved </footer>
    </div>
  </body>
</html>
